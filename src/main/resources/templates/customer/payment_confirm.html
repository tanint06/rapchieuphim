<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - RapChieuPhim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0f172a;
            background-image: radial-gradient(circle at top right, rgba(220, 38, 38, 0.15), transparent),
                              radial-gradient(circle at bottom left, rgba(79, 70, 229, 0.15), transparent);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .method-card input:checked + label {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg">
        <div class="flex items-center justify-between mb-8 px-4">
            <div class="flex flex-col items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-white text-sm font-bold">1</div>
                <span class="text-[10px] text-red-500 font-bold">CHỌN GHẾ</span>
            </div>
            <div class="h-[2px] flex-grow bg-red-600/30 mx-4"></div>
            <div class="flex flex-col items-center gap-2">
                <div class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center text-white shadow-[0_0_15px_rgba(220,38,38,0.5)] border-4 border-red-900/30">
                    <i class="fa-solid fa-credit-card"></i>
                </div>
                <span class="text-[10px] text-white font-bold tracking-widest uppercase">Thanh toán</span>
            </div>
        </div>

        <div class="glass-card rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-red-600 to-red-800 p-6 text-center">
                <h3 class="text-xl font-extrabold text-white tracking-tight uppercase">Xác nhận đặt vé</h3>
            </div>

            <div class="p-8">
                <div class="mb-6 flex gap-4 items-start">
                    <div class="w-20 h-28 flex-shrink-0 rounded-lg bg-slate-800 border border-slate-700 overflow-hidden shadow-lg">
                        <img th:src="${showtime.movie.poster}" class="w-full h-full object-cover opacity-80" alt="poster">
                    </div>
                    <div class="flex-grow">
                        <h4 class="text-xl font-bold text-white mb-2 leading-tight" th:text="${showtime.movie.title}">Tên Phim</h4>
                        <p class="text-slate-400 text-sm flex items-center gap-2 mb-1">
                            <i class="fa-regular fa-calendar text-red-500"></i>
                            <span th:text="${#temporals.format(showtime.startTime, 'HH:mm - dd/MM/yyyy')}"></span>
                        </p>
                        <p class="text-slate-400 text-sm flex items-center gap-2">
                            <i class="fa-solid fa-couch text-red-500"></i>
                            Ghế: <span class="text-green-400 font-bold" th:text="${selectedSeatsStr}">A1, A2</span>
                        </p>
                    </div>
                </div>

                <div class="border-t border-slate-700/50 my-6"></div>

                <div class="mb-8">
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-4">Phương thức thanh toán</p>
                    <div class="grid grid-cols-1 gap-3">
                        <div class="method-card relative">
                            <input type="radio" name="pm" id="vnpay" class="absolute opacity-0" checked>
                            <label for="vnpay" class="flex items-center justify-between p-4 rounded-xl border border-slate-700 bg-slate-800/40 cursor-pointer transition-all hover:bg-slate-800/60 group">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center p-1 font-bold text-blue-800 italic text-xs">VNPay</div>
                                    <span class="text-slate-200 font-medium">Momo / VNPay / ATM</span>
                                </div>
                                <div class="w-5 h-5 rounded-full border-2 border-slate-600 flex items-center justify-center group-hover:border-red-500 transition-colors">
                                    <div class="w-2.5 h-2.5 rounded-full bg-red-600 scale-0 transition-transform"></div>
                                </div>
                            </label>
                        </div>

                        <div class="method-card relative text-opacity-50">
                            <input type="radio" name="pm" id="cash" class="absolute opacity-0">
                            <label for="cash" class="flex items-center justify-between p-4 rounded-xl border border-slate-700 bg-slate-800/40 cursor-pointer transition-all hover:bg-slate-800/60 group">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-slate-700 rounded-lg flex items-center justify-center text-slate-400">
                                        <i class="fa-solid fa-money-bill-1-wave"></i>
                                    </div>
                                    <span class="text-slate-200 font-medium">Tiền mặt tại quầy</span>
                                </div>
                                <div class="w-5 h-5 rounded-full border-2 border-slate-600 flex items-center justify-center"></div>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900/50 rounded-2xl p-4 mb-8 border border-slate-800/50">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-400 font-medium">Tạm tính:</span>
                        <span class="text-2xl font-black text-white" th:text="${#numbers.formatInteger(totalPrice, 0, 'POINT')} + ' đ'"></span>
                    </div>
                </div>

                <form th:action="@{/booking/save}" method="post">
                    <input type="hidden" name="showtimeId" th:value="${showtime.id}">
                    <input type="hidden" name="seats" th:value="${selectedSeatsStr}">
                    <button type="submit" class="w-full bg-gradient-to-r from-red-600 to-red-500 text-white font-black py-4 rounded-2xl shadow-[0_10px_25px_-5px_rgba(220,38,38,0.4)] hover:shadow-red-600/60 hover:-translate-y-1 transition-all duration-300 uppercase tracking-widest flex items-center justify-center gap-3">
                        <i class="fa-solid fa-lock text-sm opacity-50"></i>
                        THANH TOÁN NGAY
                    </button>
                    
                    <a th:href="@{/booking/{id}(id=${showtime.id})}" class="block text-center mt-4 text-slate-500 hover:text-white text-sm transition font-medium italic">
                        <i class="fa-solid fa-chevron-left text-xs mr-1"></i> Quay lại đổi ý chọn ghế khác
                    </a>
                </form>
            </div>
        </div>

        <p class="text-center text-slate-600 text-[10px] mt-8 uppercase tracking-[0.2em]">
            <i class="fa-solid fa-shield-halved mr-1 text-red-900/40"></i> Hệ thống thanh toán bảo mật 256-bit
        </p>
    </div>

    <style>
        input:checked + label .w-2\.5 { transform: scale(1); }
        input:checked + label { border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
    </style>

</body>
</html>
