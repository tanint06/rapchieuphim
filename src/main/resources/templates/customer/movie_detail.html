<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${movie.title}">Chi tiết Phim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .showtime-btn:hover { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); transform: translateY(-3px); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="p-6">
        <a href="/" class="text-gray-400 hover:text-white transition flex items-center gap-2">
            <i class="fa-solid fa-chevron-left"></i> Quay lại trang chủ
        </a>
    </nav>

    <div class="container mx-auto px-4 mt-4 lg:mt-10">
        <div class="flex flex-col lg:flex-row gap-12">
            
            <div class="lg:w-1/3 flex-shrink-0">
                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-red-600 to-purple-600 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
                    
                    <img th:src="${movie.poster}" 
                         class="relative rounded-2xl shadow-2xl w-full object-cover border border-white/10" 
                         th:alt="${movie.title}">
                </div>
            </div>

            <div class="lg:w-2/3">
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4" th:text="${movie.title}">
                    Tên Phim
                </h1>

                <div class="flex flex-wrap gap-3 mb-6">
                    <span class="px-3 py-1 rounded-full bg-red-600/20 text-red-400 border border-red-600/30 text-xs font-bold" th:text="${movie.genre}">Hành động</span>
                    <span class="px-3 py-1 rounded-full bg-gray-800 text-gray-300 border border-gray-700 text-xs font-bold">
                        <i class="fa-regular fa-clock mr-1"></i> <span th:text="${movie.duration}">120</span> phút
                    </span>
                    <span class="px-3 py-1 rounded-full bg-yellow-600/20 text-yellow-500 border border-yellow-600/30 text-xs font-bold">
                        <i class="fa-solid fa-star mr-1"></i> 8.5
                    </span>
                </div>

                <div class="mb-10">
                    <h3 class="text-lg font-semibold text-gray-400 uppercase tracking-widest mb-3 border-l-4 border-red-600 pl-3">Nội dung</h3>
                    <p class="text-gray-300 leading-relaxed text-lg italic" th:text="${movie.description}">
                        Mô tả tóm tắt nội dung phim sẽ hiển thị tại đây...
                    </p>
                </div>

                <div class="glass-card rounded-3xl p-6 md:p-8">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                        <i class="fa-solid fa-ticket text-red-500"></i>
                        CHỌN SUẤT CHIẾU
                    </h3>
                    
                    <div th:if="${#lists.isEmpty(showtimes)}" class="text-gray-500 italic">
                        Hiện chưa có lịch chiếu cho phim này.
                    </div>

                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                        <div th:each="st : ${showtimes}">
                            <a th:href="@{/booking/{id}(id=${st.id})}" 
                               class="showtime-btn block w-full glass-card p-4 rounded-xl text-center transition-all duration-300 hover:shadow-lg hover:shadow-red-900/20 group">
                                <div class="text-2xl font-bold text-white group-hover:scale-110 transition duration-300" 
                                     th:text="${#temporals.format(st.startTime, 'HH:mm')}">
                                    19:00
                                </div>
                                <div class="text-[10px] uppercase tracking-tighter text-gray-400 mt-1 group-hover:text-red-100" 
                                     th:text="${st.roomName}">
                                    PHÒNG CHIẾU 01
                                </div>
                            </a>
                        </div>
                    </div>
                    
                    <p class="text-xs text-gray-500 mt-8 flex items-center gap-2">
                        <i class="fa-solid fa-circle-info"></i> Lưu ý: Vui lòng đến trước giờ chiếu 15 phút để nhận vé.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden opacity-20">
        <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-red-900/30 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-indigo-900/20 rounded-full blur-[100px]"></div>
    </div>

</body>
</html>
