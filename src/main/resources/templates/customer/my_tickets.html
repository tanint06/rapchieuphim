<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vé của tôi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Libre+Barcode+39+Text&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            /* Hình nền rạp phim mờ ảo */
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }
        .barcode { font-family: 'Libre Barcode 39 Text', cursive; font-size: 2.8rem; }
        
        /* Hiệu ứng viền vé răng cưa bằng CSS */
        .ticket {
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }
        .ticket-edge-left {
            clip-path: polygon(100% 0, 100% 100%, 0 100%, 0% 85%, 2% 80%, 0% 75%, 2% 70%, 0% 65%, 2% 60%, 0% 55%, 2% 50%, 0% 45%, 2% 40%, 0% 35%, 2% 30%, 0% 25%, 2% 20%, 0% 15%, 2% 10%, 0% 5%, 0 0);
        }
        .ticket-edge-right {
            clip-path: polygon(0 0, 0 100%, 100% 100%, 100% 85%, 98% 80%, 100% 75%, 98% 70%, 100% 65%, 98% 60%, 100% 55%, 98% 50%, 100% 45%, 98% 40%, 100% 35%, 98% 30%, 100% 25%, 98% 20%, 100% 15%, 98% 10%, 100% 5%, 100% 0);
        }
    </style>
</head>
<body class="py-16 px-4 min-h-screen">

    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-5xl font-black text-white tracking-tighter mb-4 italic">
                MY <span class="text-red-600">TICKETS</span>
            </h2>
            <div class="h-1 w-24 bg-red-600 mx-auto rounded-full"></div>
        </div>

        <div th:if="${#lists.isEmpty(tickets)}" class="backdrop-blur-xl bg-white/10 border border-white/20 rounded-3xl p-20 text-center shadow-2xl">
            <i class="fa-solid fa-ticket-simple text-6xl text-white/20 mb-6"></i>
            <p class="text-white text-xl font-light tracking-wide mb-8">Bạn chưa có chuyến phiêu lưu nào được đặt...</p>
            <a href="/" class="bg-white text-black font-bold py-4 px-10 rounded-full hover:bg-red-600 hover:text-white transition-all duration-500 uppercase tracking-widest text-sm">
                Khám phá ngay
            </a>
        </div>

        <div class="space-y-12">
            <div th:each="ticket : ${tickets}" class="ticket flex flex-col md:flex-row w-full group transition-all duration-500 hover:-rotate-1">
                
                <div class="ticket-edge-left bg-white flex-grow p-8 md:p-10 relative">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 bg-red-600 rounded-full animate-pulse"></span>
                            <span class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">Premium Admission</span>
                        </div>
                        <span class="text-2xl font-black text-slate-800" th:text="${ticket.seatNumber}">A1</span>
                    </div>
                    
                    <h3 class="text-3xl md:text-4xl font-black text-black mb-8 uppercase italic leading-none" th:text="${ticket.showtime.movie.title}">AVENGERS</h3>
                    
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-8">
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Cinema</p>
                            <p class="font-bold text-slate-800" th:text="${ticket.showtime.roomName}">Room 01</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Time</p>
                            <p class="font-bold text-slate-800" th:text="${#temporals.format(ticket.showtime.startTime, 'HH:mm')}">19:00</p>
                        </div>
                        <div class="hidden md:block text-right">
                            <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Date</p>
                            <p class="font-bold text-slate-800" th:text="${#temporals.format(ticket.showtime.startTime, 'dd/MM/yyyy')}">20/03/2024</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white md:bg-transparent relative h-4 md:h-auto md:w-4 flex flex-col justify-center items-center">
                    <div class="hidden md:block h-full border-l-4 border-dotted border-white/30"></div>
                </div>

                <div class="ticket-edge-right bg-red-600 md:w-64 p-8 md:p-10 flex flex-col justify-between items-center text-center shadow-inner">
                    <div class="barcode text-white mb-4 select-none rotate-2 md:rotate-0">
                        *<span th:text="${ticket.id}">123</span>*
                    </div>
                    
                    <div class="mb-6">
                        <p class="text-[10px] text-red-200 font-bold uppercase tracking-widest mb-1">Price Paid</p>
                        <p class="text-2xl font-black text-white" th:text="${#numbers.formatInteger(ticket.totalPrice, 0, 'POINT')} + ' đ'">100k</p>
                    </div>

                    <form th:action="@{/booking/cancel-ticket/{id}(id=${ticket.id})}" method="post" onsubmit="return confirm('Bạn có chắc chắn muốn hủy vé này không?');">
                        <button type="submit" class="bg-black/20 hover:bg-black text-white/80 hover:text-white text-[10px] font-bold py-2 px-6 rounded-full border border-white/20 transition-all uppercase tracking-tighter">
                            Cancel Ticket
                        </button>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="mt-20 text-center">
            <a href="/" class="text-white/40 hover:text-white transition uppercase text-xs tracking-[0.5em]">
                — Back to Movie List —
            </a>
        </div>
    </div>

</body>
</html>
