<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); width: 600px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: span 2; }
        label { margin-bottom: 5px; font-size: 14px; font-weight: bold; color: #555; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; }
        input:focus, select:focus { border-color: #667eea; box-shadow: 0 0 5px rgba(102, 126, 234, 0.5); }
        .btn-submit { grid-column: span 2; padding: 12px; background-color: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.3s;}
        .btn-submit:hover { background-color: #764ba2; }
        .link { text-align: center; margin-top: 20px; font-size: 14px; }
        .link a { color: #667eea; text-decoration: none; font-weight: bold; }
        .error { color: #d9534f; text-align: center; font-weight: bold; margin-bottom: 15px; background: #fdeee8; padding: 10px; border-radius: 5px;}
    </style>
</head>
<body>
    <div class="card">
        <h2>📝 ĐĂNG KÝ TÀI KHOẢN</h2>
        <div class="error" th:if="${error}" th:text="${error}"></div>
        
        <form action="/register" method="post" class="grid-container">
            <div class="form-group">
                <label>Tên đăng nhập (*)</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu (*)</label>
                <input type="password" name="password" required>
            </div>
            
            <div class="form-group full-width">
                <label>Họ và Tên</label>
                <input type="text" name="fullname">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email">
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" name="phone">
            </div>
            <div class="form-group">
                <label>Ngày sinh</label>
                <input type="date" name="birthday">
            </div>
            <div class="form-group">
                <label>Giới tính</label>
                <select name="gender">
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                    <option value="Khác">Khác</option>
                </select>
            </div>
            <div class="form-group full-width">
                <label>Địa chỉ</label>
                <input type="text" name="address">
            </div>
            
            <button type="submit" class="btn-submit">Đăng Ký Ngay</button>
        </form>
        
        <div class="link">
            Đã có tài khoản? <a href="/login">Đăng nhập ngay</a>
        </div>
    </div>
</body>
</html>
