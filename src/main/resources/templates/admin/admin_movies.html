<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quản lý Phim</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .table-container { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-3">
                    <span class="bg-indigo-600 text-white p-2 rounded-lg">
                        <i class="fa-solid fa-film"></i>
                    </span>
                    Quản Lý Phim
                </h1>
                <p class="text-gray-500 mt-1">Hệ thống quản trị nội dung điện ảnh dành cho Admin</p>
            </div>
            
            <div class="flex gap-3">
                <a href="/" class="px-5 py-2.5 bg-white border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition font-medium flex items-center shadow-sm">
                    <i class="fa-solid fa-house mr-2"></i> Trang chủ
                </a>
                <a href="/admin/movies/add" class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium flex items-center shadow-md">
                    <i class="fa-solid fa-plus mr-2"></i> Thêm Phim Mới
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-sm text-gray-500 font-medium">Tổng số phim</p>
                <p class="text-2xl font-bold text-gray-800" th:text="${movies.size()}">0</p>
            </div>
            </div>

        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden table-container">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="px-6 py-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">Phim</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">Trạng thái</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">Thể loại</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-600 uppercase tracking-wider">Thời lượng</th>
                            <th class="px-6 py-4 text-xs font-semibold text-gray-600 uppercase tracking-wider text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <tr th:each="movie : ${movies}" class="hover:bg-blue-50/50 transition duration-150">
                            <td class="px-6 py-4 text-sm text-gray-500 font-mono" th:text="${movie.id}">#1</td>
                            <td class="px-6 py-4">
                                <div class="flex items-center">
                                    <img th:src="${movie.poster}" class="w-12 h-16 rounded shadow-sm object-cover mr-4 border border-gray-100" alt="Poster">
                                    <div>
                                        <div class="text-sm font-bold text-gray-900" th:text="${movie.title}">Tên phim</div>
                                        <div class="text-xs text-gray-400">ID: <span th:text="${movie.id}"></span></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <span th:if="${movie.active}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 mr-2"></span> Đang chiếu
                                </span>
                                <span th:unless="${movie.active}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">
                                    <span class="w-1.5 h-1.5 rounded-full bg-red-500 mr-2"></span> Đã ẩn
                                </span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-600" th:text="${movie.genre}">Hành động</td>
                            <td class="px-6 py-4 text-sm text-gray-600">
                                <i class="fa-regular fa-clock mr-1 opacity-50"></i> <span th:text="${movie.duration}">120</span>'
                            </td>
                            <td class="px-6 py-4 text-center">
                                <div class="flex justify-center gap-2">
                                    <a th:href="@{/admin/movies/edit/{id}(id=${movie.id})}" 
                                       class="p-2 text-amber-600 hover:bg-amber-50 rounded-lg transition" title="Sửa">
                                        <i class="fa-solid fa-pen-to-square"></i>
                                    </a>
                                    <a th:href="@{/admin/movies/delete/{id}(id=${movie.id})}" 
                                       onclick="return confirm('Bạn có chắc chắn muốn xóa phim này không?');"
                                       class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition" title="Xóa">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="bg-gray-50 px-6 py-3 border-t border-gray-200">
                <p class="text-xs text-gray-500">Hiển thị dữ liệu trực tiếp từ cơ sở dữ liệu.</p>
            </div>
        </div>
    </div>

</body>
</html>
