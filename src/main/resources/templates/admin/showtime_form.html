<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm Lịch Chiếu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3>Tạo Lịch Chiếu Mới</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/showtimes/save}" th:object="${showtime}" method="post">
                
                <div class="mb-3">
                    <label class="form-label">Chọn Phim:</label>
                    <select th:field="*{movie.id}" class="form-select" required>
                        <option value="">-- Chọn phim từ danh sách --</option>
                        <option th:each="m : ${movies}" 
                                th:value="${m.id}" 
                                th:text="${m.title}"></option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phòng chiếu:</label>
                    <input type="text" th:field="*{roomName}" class="form-control" placeholder="Ví dụ: Phòng 05" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Giờ chiếu:</label>
                    <input type="datetime-local" th:field="*{startTime}" class="form-control" required>
                    <small class="text-muted">Định dạng: Ngày/Tháng/Năm Giờ:Phút</small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Giá vé (VNĐ):</label>
                    <input type="number" th:field="*{price}" class="form-control" value="80000" step="5000" required>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success">Lưu Lịch Chiếu</button>
                    <a th:href="@{/admin/movies}" class="btn btn-secondary">Quay lại</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
